name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache Natural Earth downloads
        uses: actions/cache@v4
        with:
          path: .cache
          key: naturalearth-${{ hashFiles('src/MapBundle.Builder/NaturalEarth.cs') }}

      - name: Build
        run: dotnet build src --configuration Release

      - name: Test
        run: src/Tests/bin/Release/net10.0/Tests --no-ansi --no-progress --report-trx --report-trx-filename unit.trx --results-directory TestResults --coverage --coverage-output-format cobertura --coverage-output unit.cobertura.xml

      - name: Coverage gate
        shell: pwsh
        run: ./src/coverage-check.ps1 -Report TestResults/unit.cobertura.xml -Threshold 100

      - name: Build data packages
        run: dotnet run --project src/MapBundle.Builder --configuration Release --no-build -- --scale 10m --output nugets --cache .cache

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nugets
          path: nugets/*.nupkg

      - name: Upload received snapshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: received
          path: "**/*.received.*"
          if-no-files-found: ignore
