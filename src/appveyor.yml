version: '{build}'
image: Ubuntu2204
environment:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
# AppVeyor builds the code, runs tests, gates coverage, then runs the full data build: downloading the
# source data (Natural Earth cities/rivers/lakes, country-levels boundaries, osmdata land/ocean — cached
# on disk by Replicant; Geofabrik supplies only the region index) and packing every World/Region data
# package. The .cache folder is persisted between builds and re-validated, so only changed source files
# are re-downloaded.
cache:
  # Replicant's HTTP cache (the expensive part). The extracted archives are rewritten from it each
  # build, so there's no point caching them too. Keyed on the files that hold the source URLs.
  - .cache/http -> src/Tests/Builder/NaturalEarth.cs, src/Tests/Builder/CountryLevels.cs, src/Tests/Builder/OsmData.cs, src/Tests/Builder/Geofabrik.cs
build_script:
- sh: |
    set -e
    curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
    chmod +x dotnet-install.sh
    ./dotnet-install.sh --jsonfile global.json --install-dir "$HOME/dotnet"
    export PATH="$HOME/dotnet:$PATH"
    # DeterministicSourcePaths=false: ProjectDefaults turns on ContinuousIntegrationBuild (hence
    # deterministic source paths) on AppVeyor, but Microsoft's coverage collector cannot map those
    # rewritten "/_/..." paths back to files and emits an EMPTY report — which the gate below would
    # read as a meaningless 0/0 = 100%. So this build opts out: its core package (in nugets/) has
    # degraded source paths and is used only as the integration-test feed, NOT published — a separate
    # deterministic pack step at the end produces the publish-grade core in core-nuget/.
    dotnet build src --configuration Release -p:DeterministicSourcePaths=false
    src/Tests/bin/Release/net10.0/Tests --no-ansi --no-progress --report-trx --report-trx-filename unit.trx --results-directory TestResults --coverage --coverage-output-format cobertura --coverage-output unit.cobertura.xml
    pwsh ./src/coverage-check.ps1 -Report TestResults/unit.cobertura.xml -Threshold 100
    # MSBuild integration tests: build a small real MapBundle.Monaco package into the local feed
    # (offline — no source downloads; the core package from the build above stays alongside it), then
    # build two consumer projects against that feed and run them. Building the consumers IS the test —
    # the RawConsumer expects the FlatGeobuf layers copied verbatim; the ConvertedConsumer expects
    # GeoJSON plus a rendered PNG.
    src/Tests/bin/Release/net10.0/Tests --no-ansi --no-progress --treenode-filter "/*/*/IntegrationFixture/BuildMonacoPackage"
    dotnet build IntegrationTests --configuration Release
    dotnet run --project IntegrationTests/RawConsumer --configuration Release --no-build
    dotnet run --project IntegrationTests/ConvertedConsumer --configuration Release --no-build
    src/Tests/bin/Release/net10.0/Tests --no-ansi --no-progress --treenode-filter "/*/*/PackageBuilder/Generate"
    # Publish-grade core: pack with deterministic source paths (no opt-out, so the CI default
    # ContinuousIntegrationBuild stays on) into its own core-nuget/ folder, kept apart from the
    # degraded-paths core and the Monaco fixture in nugets/. -o overrides ProjectDefaults'
    # PackageOutputPath (which would otherwise drop it back into nugets/).
    dotnet pack src/MapBundle/MapBundle.csproj --configuration Release -o core-nuget
test: off
artifacts:
- path: core-nuget/*.nupkg
- path: data-nugets/*.nupkg
- path: TestResults/*.cobertura.xml
on_finish:
- sh: |
    find TestResults -name '*.trx' -exec curl -F "file=@{}" "https://ci.appveyor.com/api/testresults/mstest/$APPVEYOR_JOB_ID" \;
on_failure:
- sh: |
    find . -name '*.received.*' -print
